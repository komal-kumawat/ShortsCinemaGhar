<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Shorts Cinemaghar</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
        /* Quick Masonry/Grid style for Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            opacity: 0.8;
            /* Placeholder opacity */
        }

        .gallery-item:hover img {
            transform: scale(1.05);
            opacity: 1;
        }

        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            padding: 2rem 1rem 1rem;
            color: white;
            font-family: var(--font-display);
            font-weight: 500;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .gallery-caption {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <site-header></site-header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="title-xl"><span class="text-red">Gallery</span></h1>
                <p>Glimpses from Campus Screenings, Workshops, Film Shoots, and Showcase Events.</p>
            </div>
        </section>

        <section class="pad-section">
            <div class="container">
                <div class="gallery-grid">
                    <!-- Placeholder Gallery Items -->
                    <div class="gallery-item">
                        <div style="width: 100%; height: 100%; background: #222;"></div>
                        <div class="gallery-caption">Campus Screenings</div>
                    </div>
                    <div class="gallery-item">
                        <div style="width: 100%; height: 100%; background: #222;"></div>
                        <div class="gallery-caption">Workshops & Masterclasses</div>
                    </div>
                    <div class="gallery-item">
                        <div style="width: 100%; height: 100%; background: #222;"></div>
                        <div class="gallery-caption">Student Film Shoots</div>
                    </div>
                    <div class="gallery-item">
                        <div style="width: 100%; height: 100%; background: #222;"></div>
                        <div class="gallery-caption">Showcase Events</div>
                    </div>
                    <div class="gallery-item">
                        <div style="width: 100%; height: 100%; background: #222;"></div>
                        <div class="gallery-caption">Industry Interactions</div>
                    </div>
                    <div class="gallery-item">
                        <div style="width: 100%; height: 100%; background: #222;"></div>
                        <div class="gallery-caption">Award Ceremonies</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <site-footer></site-footer>
    <script type="module" src="/main.js"></script>
</body>

</html>
