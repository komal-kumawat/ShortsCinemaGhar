<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Shorts Cinemaghar</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-display);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--film-red);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        #confirmation-message {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            border-radius: 8px;
            color: #28a745;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <site-header></site-header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="title-xl"><span class="text-red">Contact</span> Us</h1>
                <p>If you represent a school or college interested in hosting Shorts Cinemaghar, please share your
                    details below.</p>
            </div>
        </section>

        <section class="pad-section" style="text-align: center;">
            <div class="container">
                <h2 class="title-lg" style="margin-bottom: 3rem;">Bring Shorts Cinemaghar to Your <span
                        class="text-red">Institution</span></h2>

                <div class="contact-container">
                    <form id="contact-form" action="#"
                        onsubmit="event.preventDefault(); document.getElementById('contact-form').style.display='none'; document.getElementById('confirmation-message').style.display='block';">

                        <div class="form-group">
                            <label for="name">Name <span class="text-red">*</span></label>
                            <input type="text" id="name" name="name" class="form-control" required
                                placeholder="John Doe">
                        </div>

                        <div class="grid-2" style="gap: 1.5rem;">
                            <div class="form-group">
                                <label for="email">Email Address <span class="text-red">*</span></label>
                                <input type="email" id="email" name="email" class="form-control" required
                                    placeholder="contact@institute.edu">
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number <span class="text-red">*</span></label>
                                <input type="tel" id="phone" name="phone" class="form-control" required
                                    placeholder="+91 XXXXX XXXXX">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="institution">Institution Name <span class="text-red">*</span></label>
                            <input type="text" id="institution" name="institution" class="form-control" required
                                placeholder="Institute of Technology">
                        </div>

                        <div class="grid-2" style="gap: 1.5rem;">
                            <div class="form-group">
                                <label for="city">City <span class="text-red">*</span></label>
                                <input type="text" id="city" name="city" class="form-control" required
                                    placeholder="New Delhi">
                            </div>
                            <div class="form-group">
                                <label for="type">Institution Type <span class="text-red">*</span></label>
                                <select id="type" name="type" class="form-control" required>
                                    <option value="" disabled selected>Select Type</option>
                                    <option value="school">School (Classes VIII–XII)</option>
                                    <option value="college">College / University</option>
                                    <option value="film-institute">Film Institute</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-control"
                                placeholder="Tell us more about your interest..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-red" style="width: 100%; margin-top: 1rem;">Send
                            Inquiry</button>
                    </form>

                    <div id="confirmation-message">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-bottom: 1rem;">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <p>Thank you for your interest in Shorts Cinemaghar.<br>Our team will connect with you shortly.
                        </p>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <site-footer></site-footer>
    <script type="module" src="/main.js"></script>
</body>

</html>
